<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#03010a"/>
  <!-- Border gradient ring -->
  <rect width="62" height="62" x="1" y="1" rx="13" fill="none" stroke="url(#g1)" stroke-width="1.2" opacity="0.7"/>
  <!-- NK Text -->
  <text x="32" y="42" font-family="'Arial', sans-serif" font-size="26" font-weight="800"
        text-anchor="middle" fill="url(#g1)" filter="url(#glow)" letter-spacing="-1">NK</text>
</svg>